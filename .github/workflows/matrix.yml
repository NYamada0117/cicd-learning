---
name: Matrix Practice

on:
  push:
    branches:
      - "week2-**"
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Show combination
        run: echo "Node ${{ matrix.node }} on ${{ matrix.os }}"
