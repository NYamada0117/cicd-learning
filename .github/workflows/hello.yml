---
name: Hello CI

on:
  push:
    branches:
      - main
      - "week2-**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      name:
        description: "挨拶に含める名前"
        required: true
        default: "World"
        type: string
      environment:
        description: "対象環境"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      debug:
        description: "デバッグログを出すか"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 0 * * 1"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      greeting: ${{ steps.set.outputs.greeting }}
    steps:
      - name: Decide greeting
        id: set
        run: echo "greeting=Hello from prepare" >> "$GITHUB_OUTPUT"

  greet:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Use greeting
        run: |
          echo "${{ needs.prepare.outputs.greeting }}"
